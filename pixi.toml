[workspace]
channels = ["conda-forge"]
name = "cdi-profile-collection"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "2025.3.0"

[system-requirements]
libc = "2.17"

[feature.profile.dependencies]
bluesky-base = ">=1.14.6,<2"
bluesky-queueserver = ">=0.0.24,<0.0.25"
matplotlib-base= ">=3.10.8,<4"
networkx = ">=3.6.1,<4"
nslsii = ">=0.11.8,<0.12"
numpy = ">=2.4.3,<3"
ophyd = ">=1.11.0,<2"
pyepics = ">=3.5.8,<4"
python = ">=3.13.12,<3.14"
semver = ">=3.0.4,<4"
tiled-client = ">=0.2.8,<0.3"
# needed until we get ophyd-async packaged
colorlog = ">=6.10.1,<7"
pydantic-numpy = ">=8.0.0,<9"
hdf5-external-filter-plugins = ">=0.1.0,<0.2"
databroker = ">=2.0.0,<3"
p4p = ">=4.2.2,<5"
pip = ">=26.0.1,<27"
bluesky-tiled-plugins = ">=2.0.2,<3"

# Linux-only dependencies (EPICS and HDF5 plugins may not be available on macOS)
[feature.profile.target.linux-64.dependencies]
blosc-hdf5-plugin = ">=1.0.1,<2"
epicscorelibs = ">=7.0.7.99.1.1,<8"

[feature.profile.pypi-dependencies]
ophyd-async = { version = ">=0.17a2, <0.17a3", extras = ["ca", "pva"] }
# TODO get this onto conda-forge
cditools = { git = "https://github.com/nsls2/cditools", branch="main" }
pvxslibs = ">=1.3.2, <2"


[feature.qs.dependencies]
bluesky-queueserver = ">=0.0.24,<0.0.25"
bluesky-httpserver = ">=0.0.12,<0.0.13"

[feature.qs.tasks]
# This section needs some development work to understand the best way to
# thread the required configuration through both the task and files checked into
# the profile.  These will interact with the ansible roles for pushing out the
# systemd units
qs-backend = "start-re-manager --profile-dir=."
qs-server = "uvicorn --host localhost --port 60610 bluesky_httpserver.server:app"


[feature.terminal.dependencies]
ipython = ">=9.11.0,<10"
pyside6 = ">=6.9.2,<7"
numpy = ">=2.4.3,<3"


[feature.terminal.tasks]
start = "unset SESSION_MANAGER PYTHONPATH && MPLBACKEND=qtagg ipython --profile-dir=."
pvs = "ipython --profile-dir=. -c 'get_pv_types(); exit()'"

[feature.dev.dependencies]
pre-commit = ">=4.5.1,<5"
ruff = ">=0.15.7,<0.16"
black = ">=26.3.1,<27"
isort = ">=8.0.1,<9"
prettier = ">=3.8.1,<4"
nbstripout = ">=0.9.1,<0.10"

[feature.dev.tasks]
pre-commit-install = "pre-commit install"
pre-commit-run = "pre-commit run --all-files"
pre-commit-update = "pre-commit autoupdate"
lint = "ruff check ."
format = "ruff format ."
lint-fix = "ruff check --fix ."
black-format = "black ."
isort-fix = "isort ."

[environments]
terminal = {features=["profile", "terminal"], solve-group="profile"}
qs = {features=["profile", "qs"], solve-group="profile"}
dev = {features=["dev"], no-default-feature = true}
